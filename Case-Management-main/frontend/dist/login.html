<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXX Justice - Login</title>
  <link rel="stylesheet" crossorigin href="/assets/login-Cwznu0mJ.css">
</head>

<body>
    <div class="ambient-bg"></div>
    <div class="particles-container" id="particles-container"></div>

    <div class="login-card">

        <div class="role-tabs">
            <button class="role-btn active" data-role="officer" type="button">
                <!-- SVG Shield -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
                </svg>
                <span>Police</span>
            </button>
            <button class="role-btn" data-role="lawyer" type="button">
                <!-- SVG Scales -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L1 7h22L12 2zm0 8l-2 10H6l1.5-7.5L5 12V8h14v4l-2.5 .5L18 20h-4l-2-10z" />
                </svg>
                <span>Lawyer</span>
            </button>
            <button class="role-btn" data-role="judge" type="button">
                <!-- SVG Gavel -->
                <svg viewBox="0 0 24 24">
                    <path d="M14 6l4-4 4 4-4 4-2-2-8 8-4-4 8-8 2 2zm-2 12l-8 4v-4l8-8 4 4-4 4z" />
                </svg>
                <span>Judge</span>
            </button>
            <button class="role-btn" data-role="admin" type="button">
                <!-- SVG Gear -->
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                </svg>
                <span>Admin</span>
            </button>
        </div>

        <!-- Role animations -->
        <div class="animation-showcase">
            <!-- Police -->
            <div class="anim-svg anim-officer active">
                <div class="police-lights"></div>
                <svg viewBox="0 0 24 24" class="shield"
                    style="fill:none; stroke:var(--primary-color); stroke-width:2; stroke-linecap:round;">
                    <path d="M12 2L3 6v5c0 6 9 11 9 11s9-5 9-11V6l-9-4z" />
                </svg>
            </div>
            <!-- Lawyer -->
            <div class="anim-svg anim-lawyer">
                <svg viewBox="0 0 100 100" style="stroke:var(--primary-color); stroke-width:4; fill:none;">
                    <!-- base -->
                    <path d="M 50 20 L 50 90 M 35 90 L 65 90" />
                    <g class="scales-beam">
                        <line x1="20" y1="30" x2="80" y2="30" />
                        <g class="scales-pan-left">
                            <line x1="20" y1="30" x2="10" y2="60" />
                            <line x1="20" y1="30" x2="30" y2="60" />
                            <line x1="10" y1="60" x2="30" y2="60" />
                        </g>
                        <g class="scales-pan-right">
                            <line x1="80" y1="30" x2="70" y2="60" />
                            <line x1="80" y1="30" x2="90" y2="60" />
                            <line x1="70" y1="60" x2="90" y2="60" />
                        </g>
                    </g>
                </svg>
            </div>
            <!-- Judge -->
            <div class="anim-svg anim-judge">
                <svg viewBox="0 0 100 100"
                    style="stroke:var(--primary-color); stroke-width:4; fill:none; stroke-linecap:round;">
                    <g class="gavel-hammer">
                        <!-- head -->
                        <rect x="20" y="20" width="30" height="20" rx="4" />
                        <!-- handle -->
                        <line x1="35" y1="40" x2="70" y2="80" />
                    </g>
                    <line x1="10" y1="90" x2="50" y2="90" />
                </svg>
            </div>
            <!-- Admin -->
            <div class="anim-svg anim-admin">
                <svg viewBox="0 0 100 100" style="stroke:var(--primary-color); stroke-width:4; fill:none;">
                    <circle cx="50" cy="50" r="15" class="core-pulse" style="fill:var(--primary-color);" />
                    <g class="gear-outer">
                        <circle cx="50" cy="50" r="30" stroke-dasharray="10 10" stroke-width="8" />
                        <circle cx="50" cy="50" r="34" />
                    </g>
                </svg>
            </div>
        </div>

        <div class="text-section">
            <h2 id="form-title">Authenticate Officer</h2>
            <p>Verify your credentials to access the LEXX.</p>
        </div>

        <form id="auth-form">
            <div id="register-fields">
                <div class="input-container">
                    <input type="text" id="name" placeholder=" " autocomplete="name">
                    <label class="floating-label">Full Name</label>
                    <div class="focus-border"></div>
                </div>
                <div class="input-container">
                    <input type="text" id="badgeId" placeholder=" " autocomplete="one-time-code">
                    <label class="floating-label">Registration ID</label>
                    <div class="focus-border"></div>
                </div>
            </div>

            <div class="input-container">
                <input type="email" id="email" placeholder=" " required autocomplete="email">
                <label class="floating-label">ID / Credential (Email)</label>
                <div class="focus-border"></div>
            </div>

            <div class="input-container">
                <input type="password" id="password" placeholder=" " required autocomplete="new-password">
                <label class="floating-label">Secure Passcode</label>
                <div class="focus-border"></div>
            </div>

            <div class="form-actions">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember-me">
                    Remember me
                </label>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Sync Officer Profile</button>
        </form>

        <div class="toggle-mode">
            <span id="toggle-prompt">New personnel?</span> <span id="toggle-btn">Request Clearance</span>
        </div>
    </div>

    <!-- Go Back Link -->
    <a href="index.html"
        style="position:absolute; bottom:30px; color:var(--text-muted); text-decoration:none; font-size:0.9rem; transition:color 0.3s; z-index:10;"
        onmouseover="this.style.color=document.documentElement.style.getPropertyValue('--primary-color')"
        onmouseout="this.style.color='var(--text-muted)'">
        &larr; Return to Central LEXX
    </a>

    <script src="./login.js"></script>
</body>

</html>
