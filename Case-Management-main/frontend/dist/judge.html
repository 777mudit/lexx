<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CMS - Judicial Dashboard</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --accent-color: #60a5fa;
            --metallic-border: #333;
            --metallic-card: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(15, 15, 15, 0.9));
        }

        body {
            display: grid;
            grid-template-columns: 260px 1fr 340px;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* Sidebars */
        .left-sidebar,
        .right-sidebar {
            background: rgba(15, 15, 15, 0.95);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .left-sidebar {
            border-right: 1px solid var(--metallic-border);
        }

        .right-sidebar {
            border-left: 1px solid var(--metallic-border);
            overflow-y: auto;
            gap: 15px;
        }

        .profile-card {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--metallic-border);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--metallic-card);
            margin: 0 auto 15px;
            border: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
        }

        .profile-name {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }

        .profile-role {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .btn-wallet {
            background: var(--metallic-card);
            border: 1px solid var(--primary-color);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .btn-wallet:hover {
            background: rgba(37, 99, 235, 0.2);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
        }

        .logout-btn {
            margin-top: auto;
            text-align: center;
            color: #ff4d4d;
            padding: 12px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ff4d4d;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        .sidebar-title {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0a;
            border: 1px solid var(--metallic-border);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .case-item {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--metallic-border);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .case-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #555;
            transform: translateX(-5px);
        }

        .case-item.active {
            background: rgba(37, 99, 235, 0.15);
            border-left: 4px solid var(--primary-color);
        }

        /* Main Area */
        .main-area {
            position: relative;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.03), transparent 40%);
        }

        .panel-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--metallic-border);
        }

        .panel-header h2 {
            font-size: 2.5rem;
            color: #fff;
        }

        .panel-header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .info-card {
            background: rgba(20, 20, 20, 0.5);
            padding: 24px;
            border: 1px solid var(--metallic-border);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
            background: rgba(10, 10, 10, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .dash-form {
            background: rgba(20, 20, 20, 0.5);
            padding: 30px;
            border: 1px solid var(--metallic-border);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #fff;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-finalize {
            background: #10b981;
            color: #000;
            width: 100%;
            justify-content: center;
            padding: 18px;
            font-size: 1.1rem;
        }

        .btn-finalize:hover {
            background: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .btn-finalize:disabled {
            background: #064e3b;
            color: #aaa;
            cursor: not-allowed;
        }

        .btn-mark-false {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            width: 100%;
            justify-content: center;
        }

        .btn-mark-false:hover {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .btn-mark-false:disabled {
            border-color: #7f1d1d;
            color: #7f1d1d;
            cursor: not-allowed;
        }

        .badge-chain {
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: auto;
        }

        .badge-false {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: auto;
        }
    </style>
  <script type="module" crossorigin src="/assets/judge-Bz-GGCTY.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/animations-BWX3bC_M.js">
  <link rel="modulepreload" crossorigin href="/assets/web3Service-BnnceUp4.js">
  <link rel="stylesheet" crossorigin href="/assets/animations-DSvRzO7p.css">
</head>

<body>
    <!-- Left Sidebar -->
    <aside class="left-sidebar slide-in-left visible">
        <div class="profile-card">
            <div class="profile-img">⚖️</div>
            <div class="profile-name" id="user-name">Loading...</div>
            <div class="profile-role" id="user-role">ID: ------</div>
        </div>

        <div class="nav-links">
            <div class="nav-link"
                style="color:#fff; background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary-color);">
                <span>📊</span> Judicial Review
            </div>
        </div>

        <div class="logout-btn" id="logout-action">Secure Logout</div>
    </aside>

    <!-- Main area -->
    <main class="main-area">
        <div id="main-content-container">
            <div class="panel-header">
                <h2>Judicial Oversight</h2>
                <p>Select a case to inspect evidence on-chain and finalize rulings.</p>
            </div>

            <div
                style="display:flex; justify-content:center; align-items:center; height: 300px; color: #666; flex-direction: column; text-align:center;">
                <span style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;">⚖️</span>
                <p>No Case Selected<br>Awaiting your review.</p>
            </div>
        </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar slide-in-right visible">
        <div class="sidebar-title">
            <span>REGISTERED CASES</span>
            <span class="badge" style="color:#60a5fa; background:rgba(96,165,250,0.2)" id="total-count">0 Items</span>
        </div>

        <button class="btn-wallet" id="connect-wallet-btn">
            <span style="font-size: 1.2rem;">🦊</span> Connect MetaMask
        </button>
        <div id="wallet-address"
            style="color: #bbb; font-size: 0.8rem; text-align: center; margin-bottom: 5px; display: none;"></div>

        <div class="search-box" style="margin-bottom: 5px; margin-top: 10px;">
            <input type="text" id="case-search" placeholder="Filter cases by title...">
        </div>

        <div id="case-list-container" style="display: flex; flex-direction: column; gap: 10px; overflow-y: auto;">
            <p style="color: #666; text-align: center; margin-top: 20px;">Loading cases...</p>
        </div>
    </aside>

</body>

</html>
