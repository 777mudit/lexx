<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus CMS - Admin Dashboard</title>
    <style>
        :root {
            /* Admin Theme Variables */
            --primary-cocalr: #8b5cf6;
            --accent-color: #22d3ee;
            --metallic-border: #333;
            --metallic-card: linear-gradient(145deg, rgba(20, 20, 20, 0.9), rgba(15, 15, 15, 0.9));
        }

        body {
            display: grid;
            grid-template-columns: 260px 1fr 340px;
            /* Wider right sidebar to accommodate cases list */
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* Left Sidebar */
        .left-sidebar {
            background: rgba(15, 15, 15, 0.95);
            border-right: 1px solid var(--metallic-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .profile-card {
            text-align: center;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--metallic-border);
            margin-bottom: 30px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--metallic-card);
            margin: 0 auto 15px;
            border: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .profile-name {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }

        .profile-role {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .nav-link {
            padding: 12px 15px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .logout-btn {
            margin-top: auto;
            text-align: center;
            color: #ff4d4d;
            padding: 12px;
            border: 1px solid #ff4d4d;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ff4d4d;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        /* Right Sidebar - Cases Filter & List */
        .right-sidebar {
            background: rgba(15, 15, 15, 0.95);
            border-left: 1px solid var(--metallic-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .btn-wallet {
            background: var(--metallic-card);
            border: 1px solid var(--primary-color);
            padding: 12px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .btn-wallet:hover {
            background: rgba(139, 92, 246, 0.2);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0a;
            border: 1px solid var(--metallic-border);
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
        }

        .case-item {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid var(--metallic-border);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .case-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #555;
            transform: translateX(-5px);
        }

        .case-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-left: 4px solid var(--primary-color);
        }

        .case-item-icon {
            font-size: 1.2rem;
            color: #64748b;
        }

        .case-item.active .case-item-icon {
            color: var(--primary-color);
        }

        .case-item-title {
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .case-item-meta {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Main Content Area */
        .main-area {
            position: relative;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.03), transparent 40%);
        }

        .panel-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--metallic-border);
        }

        .panel-header h2 {
            font-size: 2.5rem;
            color: #fff;
        }

        .panel-header p {
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* Dark Mode Analysis Card */
        .dash-form {
            background: rgba(20, 20, 20, 0.5);
            padding: 30px;
            border: 1px solid var(--metallic-border);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
        }

        .top-section {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(10, 10, 10, 0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .evidence-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
            border-right: 1px solid #333;
            padding-right: 30px;
        }

        .shield-icon {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .view-link {
            color: #3b82f6;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            margin-top: 10px;
        }

        .view-link:hover {
            text-decoration: underline;
        }

        .report-content {
            background: rgba(10, 10, 10, 0.8);
            padding: 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #ccc;
            margin-bottom: 24px;
            border: 1px solid #333;
            white-space: pre-wrap;
        }

        /* Parallel Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-action {
            flex: 1;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-approve {
            background: #10b981;
            color: #000;
            border: none;
        }

        .btn-approve:hover {
            background: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .btn-approve:disabled {
            background: #064e3b;
            color: #aaa;
            cursor: not-allowed;
        }

        .btn-reject {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .btn-reject:disabled {
            border-color: #7f1d1d;
            color: #7f1d1d;
            cursor: not-allowed;
        }

        .pulse {
            animation: pulseAnim 2s infinite;
        }

        @keyframes pulseAnim {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>

  <link rel="stylesheet" crossorigin href="/assets/animations-DSvRzO7p.css">
</head>

<body>

    <!-- Left Sidebar -->
    <aside class="left-sidebar slide-in-left visible">
        <div class="profile-card">
            <div class="profile-img">🛡️</div>
            <div class="profile-name" id="user-name">Loading...</div>
            <div class="profile-role" id="user-role">ID: ------</div>
        </div>

        <div class="nav-links">
            <div class="nav-link"
                style="color:#fff; background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary-color);">
                <span>📊</span> Dashboard Home
            </div>
        </div>

        <div class="logout-btn" id="logout-action">Secure Logout</div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-area">
        <div id="main-content-container">
            <div class="panel-header">
                <h2>Admin Oversight</h2>
                <p>Select a case from the right dashboard to review forensic analysis and finalize evidence.</p>
            </div>

            <div
                style="display:flex; justify-content:center; align-items:center; height: 300px; color: #666; flex-direction: column; text-align:center;">
                <span style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;">🗂️</span>
                <p>No Case Selected<br>Awaiting your review.</p>
            </div>
        </div>
    </main>

    <!-- Right Sidebar / Case Filter -->
    <aside class="right-sidebar slide-in-right visible">
        <div class="sidebar-title">
            <span>PENDING QUEUE</span>
            <span class="badge" id="pending-count">0 Items</span>
        </div>

        <button class="btn-wallet" id="connect-wallet-btn">
            <span style="font-size: 1.2rem;">🦊</span> Connect MetaMask
        </button>
        <div id="wallet-address"
            style="color: #bbb; font-size: 0.8rem; text-align: center; margin-bottom: 5px; display: none;"></div>

        <div class="search-box" style="margin-bottom: 5px; margin-top: 10px;">
            <input type="text" id="case-search" placeholder="Filter cases...">
        </div>

        <div id="case-list-container" style="display: flex; flex-direction: column; gap: 10px; overflow-y: auto;">
            <p style="color: #666; text-align: center; margin-top: 20px;">Loading cases...</p>
        </div>
    </aside>

</body>

</html>
